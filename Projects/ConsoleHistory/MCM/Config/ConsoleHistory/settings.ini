; DO NOT EDIT THIS FILE. Create ${Fallout4DataPath}/MCM/Settings/ConsoleHistory.ini and set your overrides there

[Main]
HistorySize = 128
; you can choose any file anywhere
; if path is relative it will append to ${Home}/Documents/My Games/Fallout4
HistoryFile = console_history.txt

; you can also add the file path like so:
; WelcomeMessage = Console History read from {}
; WelcomeMessage = I just read {} and it was beautiful

; set to empty if you want it disabled
; WelcomeMessage =
WelcomeMessage = Console History initialized

; prompt supports html
; when in-game, it replaces $User with player name, and $Path with the current location name
; when in main-menu $User becomes `root` and $Path becomes `~`
Prompt = [<font color='#00e06e'>$User</font>@<font color='#88e000'>FO4</font>:<font color='#d7e000'>$Path</font>$]
; Prompt = --- ; this is the original prompt. you can use it if you have no soul

TogglePanelsKey = F1 ; key toggle for BetterConsole panels

; aliases are a way to make your custom shortcuts
; [Aliases]
; pridme = prid player
; save = cgf "RotatingSaves.SaveGame"


[Style]
ScreenPercent = 40 ; how much of the screen space it takes, vertically.
FontSize = 10

TitleFontSize = 12 ; title, aka selected item
InfoBoxFontSize = 12 ; BetterConsole infos on the right

; colors accept either #RRGGBB or #RRGGBBAA

FontColor = #F3F3F3
SelectionColor = #121212FF
SelectionBackgroundColor = #F3F3F3FF

TitleFontColor = #F3F3F3
HistoryFontColor = #999999
PromptFontColor = #999999
InfoBoxFontColor = #999999

[Logging]
Level = info
